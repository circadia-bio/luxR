url: https://luxr.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # ── Colours (luxR hex logo palette, sampled from the desert illustration) ──
    # cream #F8EDC7 | rose #A53A43 | gold #FFCB4A | tan/terracotta #ECA366
    bg:              "#F8EDC7"          # cream
    fg:              "#3A1712"          # dark umber (text)
    primary:         "#A53A43"          # rose
    secondary:       "#ECA366"          # tan/terracotta
    success:         "#A53A43"          # rose
    info:            "#ECA366"          # tan/terracotta
    warning:         "#FFCB4A"          # gold
    danger:          "#A53A43"          # rose

    # ── Fonts ─────────────────────────────────────────────────────────────────
    base_font:       {google: "DM Sans"}
    heading_font:    {google: "DM Sans"}
    code_font:       {google: "JetBrains Mono"}

    # ── Typography ────────────────────────────────────────────────────────────
    font-size-base:  "1rem"
    headings-font-weight: 700

    # ── Cards / surfaces ──────────────────────────────────────────────────────
    card-bg:         "#FFFCFA"          # warm white
    card-border-color: "#FFCB4A"        # gold
    card-border-radius: "0.75rem"

    # ── Code blocks ───────────────────────────────────────────────────────────
    pre-bg:          "#3A1712"          # dark umber
    pre-color:       "#F8EDC7"          # cream

  includes:
    in_header: |
      <!-- Override pkgdown og:image with raster PNG for social sharing -->
      <meta property="og:image" content="https://lux.circadia-lab.uk/logo.png">
      <meta property="og:image:width" content="1080">
      <meta property="og:image:height" content="1080">
      <meta property="og:image:type" content="image/png">
      <meta name="twitter:card" content="summary">
      <meta name="twitter:image" content="https://lux.circadia-lab.uk/logo.png">
      <!-- Fathom - beautiful, simple website analytics -->
      <script src="https://cdn.usefathom.com/script.js" data-site="NKUSHGRU" defer></script>
      <!-- / Fathom -->
      <meta name="theme-color" content="#A53A43">
      <style>
        /* ── Navbar ── */
        .navbar {
          background-color: #A53A43 !important;
          border-bottom: 2px solid #FFCB4A;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar .navbar-toggler-icon,
        .navbar form .btn {
          color: #F8EDC7 !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.8; }
        .navbar-nav .nav-link.active {
          color: #F8EDC7 !important;
          border-bottom: 2px solid #FFCB4A;
        }

        /* ── Navbar logo size ── */
        .navbar-brand img { height: 40px; width: auto; }

        /* ── Remove border under page title ── */
        .page-header { border-bottom: none !important; }

        /* ── Sidebar TOC links ── */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #3A1712 !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #A53A43 !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #A53A43 !important;
          border-left: 2px solid #FFCB4A;
          font-weight: 600;
        }

        /* ── text-muted ── */
        .text-muted { color: #ECA366 !important; }

        /* ── Sidebar border ── */
        .sidebar { border-left: 3px solid #FFCB4A; padding-left: 1rem; }

        /* ── Reference index section headers ── */
        .reference-index h2 {
          color: #A53A43;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* ── Inline code ── */
        code { color: #3A1712; background: #FBF0DC;
          border-radius: 4px; padding: 0.1em 0.35em; }

        /* ── Links ── */
        a { color: #A53A43; }
        a:hover { color: #ECA366; }

        /* ── Footer ── */
        .footer { background: #A53A43; color: #F8EDC7; padding: 1.5rem 0; }
        .footer a { color: #FFCB4A; }

        /* ── Search ── */
        #search-input { border-color: #A53A43; }

        /* ── Buttons ── */
        .btn-primary {
          background-color: #A53A43 !important;
          border-color: #A53A43 !important;
          color: #F8EDC7 !important;
        }
        .btn-primary:hover {
          background-color: #ECA366 !important;
          border-color: #ECA366 !important;
          color: #3A1712 !important;
        }
      </style>

logo: man/figures/logo.svg

opengraph:
  image:
    src: https://lux.circadia-lab.uk/logo.png
    alt: "luxR - Light exposure and photic regularity analysis for R"
  twitter:
    creator: "@circadia_lab"
    card: summary

home:
  title: "luxR — Light exposure and photic regularity analysis for R"
  description: >
    An R package for processing ambient light exposure data from
    wrist-worn actigraphy devices (Axivity, ActTrust) in the context of
    circadian and chronobiology research: photic exposure metrics, light
    timing, and a Light Regularity Index. Built by the Circadia Lab at
    Northumbria University.
  links:
  - text: Circadia Lab
    href: https://circadia-lab.uk
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [reference, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/luxR
      aria-label: GitHub

reference:
- title: "Data structures"
  desc: "Core S3 object for a light exposure trace."
  contents:
  - light_trace
  - validate_light_trace

- title: "Exposure metrics"
  desc: "Photic exposure summaries."
  contents:
  - compute_mean_light
  - compute_tat
  - compute_photic_history
  - compute_melanopic_edi

- title: "Timing & regularity metrics"
  desc: "Light onset/offset, timing, and regularity."
  contents:
  - find_light_onset
  - find_light_offset
  - compute_light_midpoint
  - compute_lri

- title: "Visualisation"
  desc: "Actogram-style plotting for visual QC."
  contents:
  - plot_light_actogram

- title: "Package"
  desc: "Package-level documentation."
  contents:
  - luxR-package

news:
  releases:
  - text: "Changelog"
    href: news/index.html

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319
  Mario Leocadio-Miguel:
    href: https://orcid.org/0000-0002-7248-3529

footer:
  structure:
    left: [package, developed_by]
    right: [built_with]
  components:
    package: >
      **luxR** — Circadia Lab, Northumbria University.
    developed_by: >
      Lucas França & Mario Leocadio-Miguel.
